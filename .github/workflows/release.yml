name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Grant Gradle execute permission
        run: chmod +x FOF/gradlew

      - name: Build release APK
        working-directory: FOF
        run: ./gradlew assembleRelease

      - name: Sign APK
        run: |
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > /tmp/keystore.jks
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks /tmp/keystore.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out FOF/app/build/outputs/apk/release/fof-release.apk \
            FOF/app/build/outputs/apk/release/app-release-unsigned.apk
          rm -f /tmp/keystore.jks

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: FOF/app/build/outputs/apk/release/fof-release.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
